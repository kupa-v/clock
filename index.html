<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock Kiosk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="profile-dock">
      <button
        id="profileDot"
        class="profile-dot"
        aria-label="Bluetooth profile"
        title="Bluetooth profile">
      </button>

      <div id="profileMenu" class="profile-menu hidden">
        <div class="profile-menu-title">Bluetooth Profiles</div>
        <div id="profileList" class="profile-list"></div>
        <div id="profileStatus" class="profile-status">No profile selected</div>
      </div>
    </section>

    <section class="clock-stage">
      <article class="clock-card">
        <div class="city">Sydney</div>
        <div class="clock-wrap">
          <canvas id="clock-sydney" width="420" height="420"></canvas>
        </div>
        <div class="digital" id="digital-sydney">--:--:--</div>
      </article>

      <article class="clock-card">
        <div class="city">Seoul</div>
        <div class="clock-wrap">
          <canvas id="clock-seoul" width="420" height="420"></canvas>
        </div>
        <div class="digital" id="digital-seoul">--:--:--</div>
      </article>
    </section>

    <section class="now-playing" id="nowPlaying" aria-label="Now playing">
      <div class="terminal-output">
        <span class="np-icon" id="npIcon">▶</span>
        <span class="np-track" id="trackName">Nothing playing</span>
        <span class="np-dash">—</span>
        <span class="np-artist" id="artistName">Connect a phone profile</span>
        <span class="np-time" id="elapsed">0:00</span>
        <span class="np-bracket">[</span>
        <span class="np-bar" id="textProgressBar">░░░░░░░░░░</span>
        <span class="np-bracket">]</span>
        <span class="np-time" id="duration">0:00</span>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
