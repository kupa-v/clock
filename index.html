<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock Kiosk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <section class="clocks">
      <div class="clock-card">
        <div class="city">Sydney</div>
        <div class="clock-wrap"><canvas id="clock-sydney" width="360" height="360"></canvas></div>
        <div class="digital" id="digital-sydney">--:--:--</div>
      </div>

      <div class="clock-card">
        <div class="city">Seoul</div>
        <div class="clock-wrap"><canvas id="clock-seoul" width="360" height="360"></canvas></div>
        <div class="digital" id="digital-seoul">--:--:--</div>
      </div>
    </section>

    <section class="now-playing" id="nowPlaying">
      <div class="art">
        <img id="albumArt" alt="Album art" />
        <div class="art-placeholder" id="artPlaceholder">No Art</div>
      </div>

      <div class="np-main">
        <div class="np-label">Now Playing</div>
        <div class="track" id="trackName">Nothing playing</div>
        <div class="artist" id="artistName">Select this Pi in Spotify Connect</div>

        <div class="progress-wrap">
          <div class="timecode" id="elapsed">0:00</div>
          <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
          <div class="timecode" id="duration">0:00</div>
        </div>

        <div class="meta">
          <div class="status" id="playbackStatus">Waiting for playback</div>
          <div class="controls">
            <button class="control-btn" id="prevBtn">⏮</button>
            <button class="control-btn primary" id="playPauseBtn">⏯</button>
            <button class="control-btn" id="nextBtn">⏭</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
