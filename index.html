<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock Kiosk</title>
  <style>
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --ring: #3a3a3c;
      --text: #ffffff;
      --muted: #8e8e93;
      --accent: #1db954;
      --danger: #ff453a;
      --control: #2c2c2e;
      --control-active: #3a3a3c;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      user-select: none;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4vh;
      padding: 4vh 4vw 5vh;
      background: var(--bg);
    }

    .clocks {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: flex-start;
      gap: 4vw;
      width: 100%;
      max-width: 1100px;
      min-width: 0;
    }

    .clock-card {
      flex: 0 1 420px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
    }

    .city {
      font-size: clamp(22px, 2.2vw, 32px);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .clock-wrap {
      width: min(34vw, 330px);
      height: min(34vw, 330px);
      min-width: 220px;
      min-height: 220px;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .digital {
      font-size: clamp(24px, 2.2vw, 36px);
      letter-spacing: -0.03em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .sub {
      font-size: clamp(13px, 1vw, 16px);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .now-playing {
      width: min(900px, 100%);
      background: linear-gradient(180deg, #181818 0%, #121212 100%);
      border: 1px solid #232323;
      border-radius: 28px;
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 22px;
      align-items: center;
    }

    .art {
      width: 110px;
      height: 110px;
      border-radius: 20px;
      overflow: hidden;
      background: #202020;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .art-placeholder {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 12px;
    }

    .np-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .np-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .track {
      font-size: clamp(24px, 2.4vw, 36px);
      font-weight: 600;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist {
      font-size: clamp(16px, 1.4vw, 22px);
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .control-btn {
      border: 0;
      border-radius: 999px;
      width: 58px;
      height: 58px;
      background: var(--control);
      color: var(--text);
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .control-btn:active {
      background: var(--control-active);
    }

    .control-btn.primary {
      background: var(--accent);
      color: #fff;
      width: 64px;
      height: 64px;
      font-size: 24px;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .timecode {
      font-size: 14px;
      color: var(--muted);
      width: 48px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .progress {
      position: relative;
      height: 6px;
      border-radius: 999px;
      background: #2b2b2b;
      flex: 1;
      overflow: hidden;
    }

    .progress-bar {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: #fff;
      border-radius: inherit;
    }

    @media (max-height: 650px) {
      .app {
        gap: 22px;
        padding-top: 20px;
        padding-bottom: 20px;
      }

      .clock-wrap {
        width: min(30vw, 280px);
        height: min(30vw, 280px);
      }

      .now-playing {
        padding: 18px 22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="clocks">
      <div class="clock-card">
        <div class="city">Sydney</div>
        <div class="clock-wrap"><canvas id="clock-sydney" width="360" height="360"></canvas></div>
        <div class="digital" id="digital-sydney">--:--:--</div>
        <div class="sub">Australia/Sydney</div>
      </div>

      <div class="clock-card">
        <div class="city">Seoul</div>
        <div class="clock-wrap"><canvas id="clock-seoul" width="360" height="360"></canvas></div>
        <div class="digital" id="digital-seoul">--:--:--</div>
        <div class="sub">Asia/Seoul</div>
      </div>
    </section>

    <section class="now-playing">
      <div class="art">
        <img id="albumArt" alt="Album art" />
        <div class="art-placeholder" id="artPlaceholder">No Art</div>
      </div>

      <div class="np-main">
        <div class="np-label">Now Playing</div>
        <div class="track" id="trackName">Nothing playing</div>
        <div class="artist" id="artistName">Select this Pi in Spotify Connect</div>

        <div class="progress-wrap">
          <div class="timecode" id="elapsed">0:00</div>
          <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
          <div class="timecode" id="duration">0:00</div>
        </div>

        <div class="meta">
          <div class="status" id="playbackStatus">Waiting for playback</div>
          <div class="controls">
            <button class="control-btn" id="prevBtn" aria-label="Previous track">⏮</button>
            <button class="control-btn primary" id="playPauseBtn" aria-label="Play or pause">⏯</button>
            <button class="control-btn" id="nextBtn" aria-label="Next track">⏭</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      title: '',
      artist: '',
      album: '',
      artUrl: '',
      isPlaying: false,
      position: 0,
      duration: 0,
      lastUpdateMs: 0,
      hasData: false,
    };

    const trackName = document.getElementById('trackName');
    const artistName = document.getElementById('artistName');
    const playbackStatus = document.getElementById('playbackStatus');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const progressBar = document.getElementById('progressBar');
    const elapsed = document.getElementById('elapsed');
    const duration = document.getElementById('duration');
    const albumArt = document.getElementById('albumArt');
    const artPlaceholder = document.getElementById('artPlaceholder');

    function formatTime(totalSeconds) {
      const sec = Math.max(0, Math.floor(totalSeconds || 0));
      const mins = Math.floor(sec / 60);
      const rem = sec % 60;
      return `${mins}:${String(rem).padStart(2, '0')}`;
    }

    function updateNowPlayingUI() {
      const nowMs = Date.now();
      let livePosition = state.position;
      if (state.isPlaying && state.lastUpdateMs) {
        livePosition += (nowMs - state.lastUpdateMs) / 1000;
      }
      if (state.duration > 0) {
        livePosition = Math.min(livePosition, state.duration);
      }

      trackName.textContent = state.title || 'Nothing playing';
      artistName.textContent = state.artist || 'Select this Pi in Spotify Connect';
      playbackStatus.textContent = state.hasData
        ? (state.isPlaying ? 'Playing on ClockPi' : 'Paused on ClockPi')
        : 'Waiting for playback';
      playPauseBtn.textContent = state.isPlaying ? '⏸' : '▶';

      elapsed.textContent = formatTime(livePosition);
      duration.textContent = formatTime(state.duration);
      const percent = state.duration > 0 ? (livePosition / state.duration) * 100 : 0;
      progressBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;

      if (state.artUrl) {
        if (albumArt.src !== state.artUrl) albumArt.src = state.artUrl;
        albumArt.style.display = 'block';
        artPlaceholder.style.display = 'none';
      } else {
        albumArt.style.display = 'none';
        artPlaceholder.style.display = 'grid';
      }
    }

    async function fetchNowPlaying() {
      try {
        const res = await fetch('/now', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        state.title = data.title || '';
        state.artist = data.artist || '';
        state.album = data.album || '';
        state.artUrl = data.art_url || '';
        state.isPlaying = Boolean(data.is_playing);
        state.position = Number(data.position || 0);
        state.duration = Number(data.duration || 0);
        state.lastUpdateMs = Date.now();
        state.hasData = Boolean(data.title || data.artist || data.duration || data.is_playing);
      } catch (err) {
        state.hasData = false;
      }

      updateNowPlayingUI();
    }

    async function sendControl(action) {
      try {
        await fetch(`/control/${action}`, { method: 'POST' });
        setTimeout(fetchNowPlaying, 200);
      } catch (err) {
        console.log('Control failed:', action, err);
      }
    }

    document.getElementById('prevBtn').addEventListener('click', () => sendControl('previous'));
    document.getElementById('playPauseBtn').addEventListener('click', () => sendControl('playpause'));
    document.getElementById('nextBtn').addEventListener('click', () => sendControl('next'));

    function drawClock(canvasId, timeZone, digitalId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const digital = document.getElementById(digitalId);
      const size = canvas.width;
      const cx = size / 2;
      const cy = size / 2;
      const r = size * 0.42;

      const now = new Date();
      const zoned = new Date(now.toLocaleString('en-US', { timeZone }));

      const ms = zoned.getMilliseconds();
      const seconds = zoned.getSeconds() + ms / 1000;
      const minutes = zoned.getMinutes() + seconds / 60;
      const hours = (zoned.getHours() % 12) + minutes / 60;

      ctx.clearRect(0, 0, size, size);

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#1c1c1e';
      ctx.fill();
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#3a3a3c';
      ctx.stroke();

      for (let i = 0; i < 60; i++) {
        const angle = (i * 6 - 90) * Math.PI / 180;
        const outer = r - 12;
        const inner = i % 5 === 0 ? r - 30 : r - 20;
        const x1 = cx + Math.cos(angle) * inner;
        const y1 = cy + Math.sin(angle) * inner;
        const x2 = cx + Math.cos(angle) * outer;
        const y2 = cy + Math.sin(angle) * outer;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineWidth = i % 5 === 0 ? 3 : 1;
        ctx.strokeStyle = i % 5 === 0 ? '#ffffff' : '#3a3a3c';
        ctx.stroke();
      }

      drawHand(ctx, cx, cy, (hours * 30 - 90) * Math.PI / 180, r * 0.48, 7, '#ffffff');
      drawHand(ctx, cx, cy, (minutes * 6 - 90) * Math.PI / 180, r * 0.70, 5, '#ffffff');
      drawHand(ctx, cx, cy, (seconds * 6 - 90) * Math.PI / 180, r * 0.80, 2, '#ff453a');

      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();

      digital.textContent = zoned.toLocaleTimeString('en-AU', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    function drawHand(ctx, cx, cy, angle, length, width, color) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * length, cy + Math.sin(angle) * length);
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.strokeStyle = color;
      ctx.stroke();
    }

    function tick() {
      drawClock('clock-sydney', 'Australia/Sydney', 'digital-sydney');
      drawClock('clock-seoul', 'Asia/Seoul', 'digital-seoul');
      updateNowPlayingUI();
      requestAnimationFrame(tick);
    }

    fetchNowPlaying();
    setInterval(fetchNowPlaying, 3000);
    tick();
  </script>
</body>
</html>
