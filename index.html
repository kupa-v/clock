<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock Kiosk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="clock-stage" aria-label="World clocks">
      <article class="clock-card">
        <div class="city">Sydney</div>
        <div class="clock-wrap">
          <canvas id="clock-sydney" width="420" height="420"></canvas>
        </div>
        <div class="digital" id="digital-sydney">--:--:--</div>
      </article>

      <article class="clock-card">
        <div class="city">Seoul</div>
        <div class="clock-wrap">
          <canvas id="clock-seoul" width="420" height="420"></canvas>
        </div>
        <div class="digital" id="digital-seoul">--:--:--</div>
      </article>
    </section>

    <section class="now-playing" id="nowPlaying" aria-label="Now playing">
		<div class="terminal-bar">
			<span class="term-prefix">y@clockpi</span>
			<span class="term-sep">:</span>
			<span class="term-path">~/music</span>
			<span class="term-prompt">$</span>
			<span class="term-command" id="nowPlayingLine">spotifyctl --status</span>
		</div>

		<div class="terminal-output" id="terminalOutput">
			<span class="np-icon" id="npIcon"></span>
			<span class="np-track" id="trackName">Nothing playing</span>
			<span class="np-dash">—</span>
			<span class="np-artist" id="artistName">Select this Pi in Spotify Connect</span>
			<span class="np-time" id="elapsed">0:00</span>
			<span class="np-bracket">[</span>
			<span class="np-bar" id="textProgressBar">░░░░░░░░░░</span>
			<span class="np-bracket">]</span>
			<span class="np-time" id="duration">0:00</span>
		</div>

		<div class="terminal-controls">
			<button class="term-btn" id="prevBtn" aria-label="Previous">prev</button>
			<button class="term-btn primary" id="playPauseBtn" aria-label="Play or pause">play</button>
			<button class="term-btn" id="nextBtn" aria-label="Next">next</button>
		</div>
	</section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
