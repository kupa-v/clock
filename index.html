<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock Kiosk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="clock-stage" aria-label="World clocks">
      <article class="clock-card">
        <div class="city">Sydney</div>
        <div class="clock-wrap">
          <canvas id="clock-sydney" width="420" height="420"></canvas>
        </div>
        <div class="digital" id="digital-sydney">--:--:--</div>
      </article>

      <article class="clock-card">
        <div class="city">Seoul</div>
        <div class="clock-wrap">
          <canvas id="clock-seoul" width="420" height="420"></canvas>
        </div>
        <div class="digital" id="digital-seoul">--:--:--</div>
      </article>
    </section>

    <section class="now-playing" id="nowPlaying" aria-label="Now playing">
      <div class="art-shell">
        <div class="art-glow"></div>
        <div class="art">
          <img id="albumArt" alt="Album art" />
          <div class="art-placeholder" id="artPlaceholder">
            <span class="art-note">Now Playing</span>
          </div>
        </div>
      </div>

      <div class="np-main">
        <div class="np-kicker">Now Playing</div>
        <div class="track-row">
          <div class="track-block">
            <div class="track" id="trackName">Nothing playing</div>
            <div class="artist" id="artistName">Select this Pi in Spotify Connect</div>
          </div>
          <div class="status-pill" id="playbackStatus">Waiting</div>
        </div>

        <div class="progress-wrap">
          <div class="timecode" id="elapsed">0:00</div>
          <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-sheen"></div>
          </div>
          <div class="timecode" id="duration">0:00</div>
        </div>

        <div class="controls">
          <button class="control-btn" id="prevBtn" aria-label="Previous">⏮</button>
          <button class="control-btn primary" id="playPauseBtn" aria-label="Play or pause">⏯</button>
          <button class="control-btn" id="nextBtn" aria-label="Next">⏭</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</html>
